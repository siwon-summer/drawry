<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Drawry</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #00842D;
  --primary-dark: #00842D;
  --stroke: #00842D;
  --bg-input: #faf9f9;
  --bg-light: #f5f6f6;
  --bg-char: #f3f3f7;
  --bg-user: #0084ff;
  --text-body: #030E03;
  --text-muted: #666C65;
  --border: #ececec;
  --white: #fff;
}
body {
  font-family: 'Nanum Gothic', sans-serif;
  background: #ffffff;
  min-height: 100vh;
  margin: 0;
  position: relative;
}
.screen {
  width: 100%;
  min-height: 100vh;
  position: relative;
  display: none;
  flex-direction: column;
  background: #ffffff;
}
.screen.active { display: flex; }

.inner {
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
}

/* 헤더 */
.header {
  padding: 40px 20px 20px;
  text-align: center;
  display: flex; flex-direction: column; gap: 6px;
  flex-shrink: 0;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  box-sizing: border-box;
}
.header-row {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 40px 20px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
  box-sizing: border-box;
  background: #ffffff;
  z-index: 100;
}
.app-title { display: flex; justify-content: center; align-items: center; }
.app-title svg { width: auto; height: 80px; }
.app-subtitle { font-size: 13px; color: var(--text-muted); }
.chat-title { font-size: 16px; font-weight: 700; color: #030E03; }
.home-btn {
  background: var(--bg-light); border: none; border-radius: 8px;
  padding: 0 12px; height: 40px; font-size: 14px; font-weight: 700;
  color: var(--primary-dark); cursor: pointer; font-family: inherit;
}
.back-btn {
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 8px;
  flex-shrink: 0; padding: 0;
  transition: background 0.15s;
}
.back-btn:hover { background: var(--bg-light); }

/* 업로드 */
.upload-section { padding: 0 20px; flex-shrink: 0; width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
.upload-zone {
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 32px;
  padding: 40px 0;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.2s;
  user-select: none; -webkit-tap-highlight-color: transparent;
  width: 100%; aspect-ratio: 4 / 3;
}
.upload-zone:hover { border-color: var(--stroke); }
.upload-zone > *:not(input) { pointer-events: none; }
.upload-zone.has-image { padding: 0; }
.upload-zone.has-image img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 12px; display: block; }
.upload-icon-el { font-size: 40px; }
.upload-icon-svg { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
.upload-icon-svg svg { width: 80px; height: 80px; }
.upload-title { font-size: 16px; font-weight: 700; color: var(--primary); }
.upload-sub { font-size: 13px; color: var(--text-muted); }

/* 인풋 */
.info-section { padding: 40px 20px 100px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
.field-group { display: flex; flex-direction: column; gap: 8px; }
.field-label { font-size: 12px; color: var(--text-muted); }
.field-input {
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.field-input input {
  background: none; border: none; outline: none;
  font-size: 16px; font-family: inherit; color: var(--text-muted); flex: 1;
}
.field-input input::placeholder { color: var(--text-muted); }
.age-unit { font-size: 12px; font-weight: 700; color: #030E03; white-space: nowrap; }
.age-controls { display: flex; align-items: center; gap: 6px; }
.age-btn {
  width: 24px; height: 24px; border-radius: 50%;
  background: #EBEBEB; border: none; outline: none; cursor: pointer;
  font-size: 16px; font-weight: 700; color: #030E03;
  display: flex; align-items: center; justify-content: center;
  line-height: 1; user-select: none; flex-shrink: 0;
}
#childAge::-webkit-outer-spin-button,
#childAge::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
#childAge { -moz-appearance: textfield; appearance: textfield; text-align: left; width: 40px; }

/* 버튼 */
.footer-fixed { position: fixed; bottom: 0; left: 0; right: 0; padding: 0; background: #ffffff; z-index: 100; }
.footer-fixed-inner { width: 100%; max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
.footer-row { position: fixed; bottom: 0; left: 0; right: 0; padding: 0; display: flex; justify-content: center; background: #ffffff; z-index: 100; }
.footer-row-inner { width: 100%; max-width: 500px; padding: 20px; display: flex; gap: 8px; box-sizing: border-box; }
.btn-primary {
  width: 100%; height: 59px; background: var(--primary-dark);
  color: var(--white); border: none; border-radius: 12px;
  font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer;
}
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  width: 100px; height: 59px; background: var(--bg-light);
  color: #030E03; border: none; border-radius: 12px;
  font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer;
}
.btn-chat {
  flex: 1; height: 59px; background: var(--primary-dark);
  color: var(--white); border: none; border-radius: 12px;
  font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer;
}

/* 화면 2 */
.image-section { padding: 0 20px; flex-shrink: 0; width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
.image-placeholder {
  background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  position: relative; width: 100%;
  aspect-ratio: 4 / 3;
}
.image-placeholder img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 12px; }
.story-section { padding: 40px 20px 100px; flex-shrink: 0; width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box; }
.story-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.story-card {
  border: 1px solid var(--border); border-radius: 8px; padding: 20px;
  display: flex; flex-direction: column; gap: 10px;
  background: rgba(255,255,255,0.7);
}
.story-meta { display: flex; align-items: center; gap: 8px; }
.role-badge {
  background: var(--primary-dark); color: var(--white);
  font-size: 13px; padding: 2px 8px; border-radius: 6px; line-height: 1.5;
}
.char-name-label { font-size: 15px; color: #030E03; line-height: 1.5; }
.story-text { font-size: 15px; color: #030E03; line-height: 1.5; }
.audio-btn {
  background: var(--bg-light); border: none; border-radius: 8px;
  height: 40px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; font-weight: 700;
  color: #030E03; font-family: inherit; width: 100%;
  transition: background 0.2s;
}
.audio-btn:hover { background: #e2e3e3; }

/* 화면 3 채팅 — 키보드 올라와도 레이아웃 고정 */
#screen3.active {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  flex-direction: column;
}
#screen3.active .header-row {
  position: relative !important;
  top: auto; left: auto; right: auto;
  flex-shrink: 0;
}
/* chat-input-area는 항상 fixed bottom - 오버라이드 없음 */
.chat-container {
  flex: 1; overflow-y: auto; padding: 20px 0 130px;
  display: flex; flex-direction: column; gap: 18px;
  width: 100%; max-width: 500px; margin: 0 auto; box-sizing: border-box;
}
.msg-row { display: flex; align-items: flex-start; padding: 0 20px 0 12px; }
.avatar {
  width: 40px; height: 40px; background: #ecf0f5;
  border: 0.5px solid rgba(0,0,0,0.12); border-radius: 16px;
  overflow: hidden; flex-shrink: 0; margin: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.msg-content { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.sender-name { font-size: 14px; color: #030E03; padding: 3px 2px; line-height: 1.3; letter-spacing: -0.28px; }
.bubble-row { display: flex; align-items: flex-end; gap: 7px; }
.bubble-char {
  background: var(--bg-char); border-radius: 20px;
  padding: 8px 14px; font-size: 14px; color: #030E03;
  line-height: 1.5; letter-spacing: -0.28px; max-width: 210px;
  word-break: keep-all;
}
.bubble-time { font-size: 11px; color: rgba(24,37,61,0.55); white-space: nowrap; }
.sound-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: #EBEBEB; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity 0.2s;
}
.sound-icon:hover { opacity: 0.8; }
.sound-icon svg { display: block; }
.msg-row-user { display: flex; justify-content: flex-end; padding: 0 20px; }
.user-content { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.bubble-row-user { display: flex; align-items: flex-end; gap: 8px; }
.bubble-user {
  background: var(--bg-user); border-radius: 20px;
  padding: 8px 14px; font-size: 14px; color: var(--white);
  line-height: 1.5; letter-spacing: -0.28px; max-width: 210px;
  word-break: keep-all;
}

/* 채팅 입력 */
.chat-input-area {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: 1px solid rgba(24,37,61,0.06);
  padding: 0 0 env(safe-area-inset-bottom, 0px);
  display: flex; justify-content: center;
  z-index: 100;
}
.chat-input-inner {
  width: 100%; max-width: 500px;
  padding: 12px 20px 20px;
  display: flex; flex-direction: column; gap: 10px;
  box-sizing: border-box;
}
.voice-row { display: flex; align-items: center; gap: 8px; }
.toggle-wrap {
  width: 29px; height: 16px; background: #cacaca;
  border-radius: 666px; padding: 1.3px;
  display: flex; align-items: center; cursor: pointer; transition: background 0.2s;
}
.toggle-wrap.on { background: var(--primary-dark); }
.toggle-knob {
  width: 13.3px; height: 13.3px; background: var(--white);
  border-radius: 66px; transition: transform 0.2s;
}
.toggle-wrap.on .toggle-knob { transform: translateX(13px); }
.voice-label { font-size: 12px; font-weight: 500; color: var(--primary); }
.input-row { display: flex; gap: 10px; align-items: center; min-width: 0; }
.chat-field { min-width: 0; }
.mic-dark {
  width: 40px; height: 40px; background: #EBEBEB;
  border: none; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0;
  transition: opacity 0.2s;
}
.mic-dark.hidden { display: none; }
.chat-field {
  flex: 1; height: 40px; background: var(--bg-input); border-radius: 8px;
  display: flex; align-items: center; padding: 0 16px; overflow: hidden;
}
.chat-field input {
  background: none; border: none; outline: none;
  font-size: 16px; font-family: inherit; color: #030E03; flex: 1;
  letter-spacing: -0.28px;
}
.chat-field input::placeholder { color: var(--text-muted); }
.submit-btn {
  font-size: 14px; font-weight: 700; color: var(--primary-dark);
  cursor: pointer; white-space: nowrap; padding-left: 8px;
  background: none; border: none; font-family: inherit;
}

/* 로딩 오버레이 */
.overlay-loading {
  position: absolute; inset: 0;
  background: rgba(253,253,245,0.88);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; z-index: 10;
}
.overlay-loading.show { display: flex; }
.overlay-loading p { font-size: 14px; color: var(--text-muted); }
.dots::after { content: ''; animation: d 1.2s infinite; }
@keyframes d { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }

/* 로딩 오버레이 */
.story-loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
}
.story-loading-overlay.show {
  display: flex !important;
}
.story-loading-box {
  width: 240px; height: 240px;
  background: #ffffff;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#lottie-container {
  width: 150px; height: 150px;
}

/* 바텀시트 */
.bottom-sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.bottom-sheet-overlay.show {
  display: flex;
}
.bottom-sheet {
  width: 100%; max-width: 500px;
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 12px 20px 40px;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.bottom-sheet-overlay.show .bottom-sheet { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: #e0e0e0; border-radius: 2px;
  margin: 0 auto 24px;
}
.sheet-title {
  font-size: 13px; color: var(--text-muted);
  text-align: center; margin-bottom: 16px;
}
.sheet-btn {
  width: 100%; padding: 16px 0;
  background: none; border: none;
  border-radius: 12px;
  font-size: 16px; font-weight: 700;
  font-family: inherit; color: var(--primary);
  cursor: pointer; display: flex;
  align-items: center; gap: 14px;
  padding: 16px 20px;
  transition: background 0.15s;
}
.sheet-btn:hover { background: #f5f5f5; }
.sheet-btn svg { flex-shrink: 0; }
.sheet-divider { height: 1px; background: #f0f0f0; margin: 4px 0; }
.sheet-cancel {
  width: 100%; padding: 16px 0;
  background: none; border: none;
  font-size: 15px; font-family: inherit;
  color: var(--text-muted); cursor: pointer;
  margin-top: 8px;
}
</style>
</head>

  stopAll();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('chatInputArea').style.display = id === 'screen3' ? '' : 'none';
  requestAnimationFrame(() => {
    window.scrollTo(0, 0);
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
  });
}

function handleFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  imageFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      const comp = cv.toDataURL('image/jpeg', 0.85);
      imageBase64 = comp.split(',')[1];
      imageDataUrl = comp;
      const zone = document.getElementById('uploadZone');
      zone.classList.add('has-image');
      zone.innerHTML = `
        <input type="file" id="fileInput" accept="image/*" style="position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:5;">
        <img src="${comp}" alt="그림" style="width:100%;height:100%;object-fit:cover;border-radius:12px;display:block;pointer-events:none;">`;
      document.getElementById('fileInput').addEventListener('change', handleFileChange);
      document.getElementById('makeBtn').disabled = false;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('fileInput').addEventListener('change', handleFileChange);

// ── Kanana TTS
async function kananaCollect(text, pcmChunks, voiceType = 'story') {
  const cleanText = stripEmoji(text);

  let sysPrompt, voiceStyle;
  if (voiceType === 'story') {
    sysPrompt = '당신은 TTS 낭독 로봇입니다. 입력된 텍스트를 한 글자도 바꾸지 않고 그대로만 음성으로 출력합니다. 절대로 새로운 문장을 생성하거나, 질문하거나, 추가 설명을 하지 않습니다. 오직 입력 텍스트만 낭독합니다.';
    voiceStyle = '따뜻하고 차분한 성인 여성 나레이터 목소리로';
  } else {
    const isMale = window._charGender === 'male';
    const age = window._charAge || 10;
    let voiceDesc;
    if (isMale) {
      voiceDesc = age <= 12 ? '높고 명랑한 남자아이' : age <= 19 ? '활기찬 10대 남성' : age <= 35 ? '낮고 친근한 청년 남성' : age <= 55 ? '중후한 중년 남성' : '따뜻한 노년 남성';
    } else {
      voiceDesc = age <= 12 ? '높고 귀여운 여자아이' : age <= 19 ? '밝고 생동감 있는 10대 여성' : age <= 35 ? '맑고 따뜻한 청년 여성' : age <= 55 ? '차분하고 포근한 중년 여성' : '온화한 노년 여성';
    }
    sysPrompt = '당신은 TTS 낭독 로봇입니다. 입력된 텍스트를 한 글자도 바꾸지 않고 그대로만 음성으로 출력합니다. 절대로 새로운 문장을 생성하거나, 질문하거나, 추가 설명을 하지 않습니다. 오직 입력 텍스트만 낭독합니다.';
    voiceStyle = `${voiceDesc} 캐릭터 목소리로`;
  }

  const res = await fetch(`${KANANA_BASE_URL}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'kanana-o',
      messages: [
        { role: 'system', content: sysPrompt },
        { role: 'user', content: `[낭독 지시] 아래 텍스트를 ${voiceStyle} 그대로 읽어주세요. 내용 추가/변경/질문 금지.\n\n${cleanText}` }
      ],
      modalities: ['text', 'audio'], stream: true
    })
  });

  if (!res.ok) {
    const err = await res.text().catch(() => '');
    console.error('[kananaCollect] API error', res.status, err);
    return;
  }

  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n'); buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (d === '[DONE]') break;
      try {
        const json = JSON.parse(d);
        const delta = json.choices?.[0]?.delta;
        const b64 = delta?.audio?.data ?? delta?.audio ?? null;
        if (!b64 || typeof b64 !== 'string') continue;
        const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const s16 = new Int16Array(raw.buffer);
        const f32 = new Float32Array(s16.length);
        for (let i = 0; i < s16.length; i++) f32[i] = s16[i] / 32768;
        pcmChunks.push(f32);
      } catch(e) {}
    }
  }
}

const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

function unlockAudio() {
  if (_isIOS) {
    // iOS: HTML5 Audio unlock — 유저 제스처 내에서 무음 재생
    if (!window._iosUnlocked) {
      const a = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
      a.play().catch(() => {});
      window._iosUnlocked = true;
    }
    return;
  }
  if (window._audioCtx && window._audioCtx.state !== 'closed') {
    window._audioCtx.resume().catch(() => {});
    return;
  }
  const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  const silent = ctx.createBuffer(1, 1, 24000);
  const src = ctx.createBufferSource();
  src.buffer = silent; src.connect(ctx.destination); src.start(0);
  ctx.resume().catch(() => {});
  window._audioCtx = ctx;
}

function pcmToWav(chunks) {
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const f32 = new Float32Array(total);
  let off = 0;
  for (const c of chunks) { f32.set(c, off); off += c.length; }
  const i16 = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++) i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
  const buf = new ArrayBuffer(44 + i16.byteLength);
  const dv = new DataView(buf);
  const ws = (o, s) => [...s].forEach((c, i) => dv.setUint8(o + i, c.charCodeAt(0)));
  ws(0,'RIFF'); dv.setUint32(4, 36 + i16.byteLength, true);
  ws(8,'WAVE'); ws(12,'fmt ');
  dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
  dv.setUint32(24,24000,true); dv.setUint32(28,48000,true);
  dv.setUint16(32,2,true); dv.setUint16(34,16,true);
  ws(36,'data'); dv.setUint32(40, i16.byteLength, true);
  new Int16Array(buf, 44).set(i16);
  return new Blob([buf], { type: 'audio/wav' });
}

function stopAll() {
  if (window._iosAudio) { window._iosAudio.pause(); window._iosAudio = null; }
  currentSources.forEach(s => { try { s.stop(); } catch(e){} });
  currentSources = [];
  isPlayingGlobal = false;
  try { speechSynthesis.cancel(); } catch(e) {}
}

async function playPCM(pcmChunks, onEnd) {
  stopAll();
  if (_isIOS) {
    // iOS: PCM → WAV blob → HTML5 Audio (Web Audio API 제한 우회)
    const wav = pcmToWav(pcmChunks);
    const url = URL.createObjectURL(wav);
    const audio = new Audio(url);
    window._iosAudio = audio;
    isPlayingGlobal = true;
    const cleanup = () => { isPlayingGlobal = false; URL.revokeObjectURL(url); window._iosAudio = null; if (onEnd) onEnd(); };
    audio.onended = cleanup;
    audio.onerror = cleanup;
    try { await audio.play(); } catch(e) { cleanup(); }
    return;
  }
  // 데스크탑: Web Audio API
  const ctx = (window._audioCtx && window._audioCtx.state !== 'closed')
    ? window._audioCtx
    : new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  window._audioCtx = ctx;
  try { await ctx.resume(); } catch(e) {}
  isPlayingGlobal = true;
  let t = ctx.currentTime + 0.1; let last = null;
  for (const f32 of pcmChunks) {
    const ab = ctx.createBuffer(1, f32.length, 24000);
    ab.copyToChannel(f32, 0);
    const src = ctx.createBufferSource();
    src.buffer = ab; src.connect(ctx.destination);
    src.start(t); t += ab.duration;
    currentSources.push(src); last = src;
  }
  if (last) last.onended = () => { isPlayingGlobal = false; if (onEnd) onEnd(); };
}

function stripEmoji(text) {
  return text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[\u{1F300}-\u{1F9FF}]/gu, '')
    .replace(/[\u{1FA00}-\u{1FAFF}]/gu, '')
    .replace(/\s{2,}/g, ' ').trim();
}

function browserTTS(text, onEnd, gender) {
  stopAll();
  const u = new SpeechSynthesisUtterance(stripEmoji(text));
  u.lang = 'ko-KR';
  const isMale = (gender || window._charGender) === 'male';
  u.rate = isMale ? 0.88 : 0.9;
  u.pitch = isMale ? 0.6 : 1.2;
  window._activeUtterance = u;
  speechSynthesis.speak(u);
  u.onend = () => { window._activeUtterance = null; if (onEnd) onEnd(); };
}

const PAUSE_SVG = `<svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0"><rect x="0" y="0" width="4.5" height="16" rx="2.25" fill="#030E03"/><rect x="9.5" y="0" width="4.5" height="16" rx="2.25" fill="#030E03"/></svg>`;

function setAudioBtn(btn, state) {
  if (!btn) return;
  if (state === 'playing') btn.innerHTML = `${PAUSE_SVG}<span style="margin-left:6px">일시정지하기</span>`;
  else if (state === 'loading') btn.innerHTML = `<span>준비 중...</span>`;
  else btn.innerHTML = `<span>음성으로 들어보기</span>`;
}

async function playOrCollect(text, pcmChunks, btn, collectPromise) {
  if (isPlayingGlobal) {
    stopAll(); setAudioBtn(btn, 'idle'); return;
  }
  unlockAudio(); // iOS: 유저 제스처 직후 동기적으로 unlock
  const done = () => setAudioBtn(btn, 'idle');
  setAudioBtn(btn, 'loading');
  // 수집이 아직 진행 중이면 완료될 때까지 대기
  if (collectPromise) {
    try { await collectPromise; } catch(e) {}
  }
  // 수집된 게 없으면 지금 수집
  if (pcmChunks.length === 0) {
    try { await kananaCollect(text, pcmChunks); } catch(e) {}
  }
  if (pcmChunks.length > 0) {
    setAudioBtn(btn, 'playing');
    await playPCM(pcmChunks, done);
  } else {
    done();
  }
}

// ── 주인공 얼굴 크롭 (canvas로 정밀 크롭)
async function cropFaceAvatar(dataUrl, region) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      // 얼굴 중심 좌표 계산
      const cx = (region.x + region.w / 2) * img.width;
      const cy = (region.y + region.h / 2) * img.height;
      // 크롭 크기: 얼굴 영역보다 여유있게 1.4배
      const size = Math.max(region.w * img.width, region.h * img.height) * 1.4;
      const sx = Math.max(0, cx - size / 2);
      const sy = Math.max(0, cy - size / 2);
      const sw = Math.min(size, img.width - sx);
      const sh = Math.min(size, img.height - sy);

      const cv = document.createElement('canvas');
      cv.width = 80; cv.height = 80;
      const ctx = cv.getContext('2d');
      // 원형 마스크
      ctx.beginPath();
      ctx.arc(40, 40, 40, 0, Math.PI * 2);
      ctx.clip();
      // 크롭된 영역을 80x80에 맞게 그리기
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 80, 80);
      resolve(cv.toDataURL('image/png', 0.95));
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

// ── 채팅 버블
function addCharBubble(text, pcmChunks, kananaPromise) {
  const c = document.getElementById('chatContainer');
  const row = document.createElement('div');
  row.className = 'msg-row';
  const avatarHtml = window._charAvatar
    ? `<div class="avatar" style="padding:0;overflow:hidden;border-radius:50%;flex-shrink:0;"><img src="${window._charAvatar}" style="width:100%;height:100%;object-fit:cover;display:block;"></div>`
    : `<div class="avatar">🌟</div>`;
  row.innerHTML = `
    ${avatarHtml}
    <div class="msg-content">
      <div class="sender-name">${charName}</div>
      <div class="bubble-row">
        <div class="bubble-char">${text}</div>
        <span class="bubble-time">방금</span>
      </div>
      <button class="sound-icon">
        <svg class="play-icon" width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M1 1L11 7L1 13V1Z" fill="#030E03"/></svg>
        <svg class="pause-icon" width="12" height="14" viewBox="0 0 12 14" fill="none" style="display:none"><rect x="1" y="1" width="3.5" height="12" rx="1" fill="#030E03"/><rect x="7.5" y="1" width="3.5" height="12" rx="1" fill="#030E03"/></svg>
      </button>
    </div>`;
  const icon = row.querySelector('.sound-icon');
  let playing = false;
  const playIco = icon.querySelector('.play-icon');
  const pauseIco = icon.querySelector('.pause-icon');
  const showPlay = () => { playIco.style.display = ''; pauseIco.style.display = 'none'; };
  const showPause = () => { playIco.style.display = 'none'; pauseIco.style.display = ''; };
  icon.addEventListener('click', async () => {
    if (playing) { stopAll(); playing = false; showPlay(); return; }
    unlockAudio(); // iOS: 유저 제스처 직후 동기적으로 unlock
    playing = true; showPause();
    const done = () => { playing = false; showPlay(); };
    if (pcmChunks.length > 0) {
      await playPCM(pcmChunks, done);
    } else {
      try {
        if (kananaPromise) await kananaPromise;
      } catch(e) {}
      if (!playing) return;
      if (pcmChunks.length > 0) {
        await playPCM(pcmChunks, done);
      } else {
        // 백그라운드 수집 실패 시 재시도
        try {
          await kananaCollect(text, pcmChunks, 'char');
        } catch(e) {}
        if (!playing) return;
        if (pcmChunks.length > 0) { await playPCM(pcmChunks, done); }
        else { playing = false; showPlay(); }
      }
    }
  });
  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
}

function addUserBubble(text) {
  const c = document.getElementById('chatContainer');
  const row = document.createElement('div');
  row.className = 'msg-row-user';
  row.innerHTML = `
    <div class="user-content">
      <div class="sender-name">${childNameVal || '나'}</div>
      <div class="bubble-row-user">
        <div class="bubble-user">${text}</div>
      </div>
    </div>`;
  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
}

let isSending = false;
async function sendChat() {
  if (isSending) return;
  isSending = true;
  const inp = document.getElementById('chatInput');
  const msg = inp.value.trim();
  if (!msg) { isSending = false; return; }
  inp.value = '';
  addUserBubble(msg);
  chatHistory.push({ role: 'user', content: msg });
  try {
    const isAdultChat = selectedAge >= 19;
    const sys = isAdultChat
      ? `너는 그림 속 캐릭터 "${charName}"야. 이야기: ${storyContext}. 대화 상대: ${childNameVal}(${selectedAge}세 어른). 어른의 감정에 깊이 공감하고 위로하는 따뜻한 말투로, 1~2문장으로 대답해. 캐릭터 성별: ${window._charGender === 'male' ? '남성' : '여성'}.`
      : `너는 그림 속 캐릭터 "${charName}"야. 동화: ${storyContext}. 아이 이름: ${childNameVal}. 친근하고 따뜻하게 1~2문장으로, ${selectedAge}세 수준으로. 캐릭터 성별: ${window._charGender === 'male' ? '남성' : '여성'}.`;
    const res = await fetch(`${KANANA_BASE_URL}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'kanana-o', max_tokens: 200, messages: [{ role: 'system', content: sys }, ...chatHistory] })
    });
    if (!res.ok) {
      if (res.status === 429) throw new Error('quota');
      throw new Error(`${res.status}`);
    }
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content?.trim() || '...';
    chatHistory.push({ role: 'assistant', content: reply });
    const pcm = [];
    const p = kananaCollect(reply, pcm, 'char').catch(() => {});
    addCharBubble(reply, pcm, p);
  } catch(e) {
    const msg = e.message === 'quota' ? 'API 사용량 한도가 초과됐어요. 잠시 후 다시 시도해줘요!' : '앗, 잠깐 말을 잃었어요!';
    addCharBubble(msg, []);
  } finally {
    isSending = false;
  }
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendChat(); }
});
document.getElementById('submitBtn').addEventListener('click', () => sendChat());

// ── 나이 +/- 버튼
const ageInput = document.getElementById('childAge');
document.getElementById('ageUp').addEventListener('click', () => {
  const v = parseInt(ageInput.value) || 0;

  ageInput.dispatchEvent(new Event('input'));
});
document.getElementById('ageDown').addEventListener('click', () => {

  ageInput.dispatchEvent(new Event('input'));
});
ageInput.addEventListener('input', () => {
  ageInput.value = ageInput.value.replace(/[^0-9]/g, '');
});

let recTimerInterval = null;

async function blobToWavBase64(blob) {
  const arrayBuf = await blob.arrayBuffer();
  const tmpCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
  const decoded = await tmpCtx.decodeAudioData(arrayBuf);
  tmpCtx.close();
  // mix down to mono at 16kHz
  const numFrames = decoded.length;
  const pcm = new Float32Array(numFrames);
  for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
    const data = decoded.getChannelData(ch);
    for (let i = 0; i < numFrames; i++) pcm[i] += data[i];
  }
  if (decoded.numberOfChannels > 1) for (let i = 0; i < numFrames; i++) pcm[i] /= decoded.numberOfChannels;
  // encode to 16-bit PCM WAV
  const wavBuf = new ArrayBuffer(44 + numFrames * 2);
  const view = new DataView(wavBuf);
  const sampleRate = decoded.sampleRate;
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF'); view.setUint32(4, 36 + numFrames * 2, true);
  writeStr(8, 'WAVE'); writeStr(12, 'fmt ');
  view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true); view.setUint16(34, 16, true);
  writeStr(36, 'data'); view.setUint32(40, numFrames * 2, true);
  for (let i = 0; i < numFrames; i++) {
    const s = Math.max(-1, Math.min(1, pcm[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  const bytes = new Uint8Array(wavBuf);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function handleMic() {
  if (!voiceOn) return;
  const micIcon = document.getElementById('micIcon');
  const micStopIcon = document.getElementById('micStopIcon');
  const timerEl = document.getElementById('recTimer');

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    const chunks = [];
    const mimeType = ['audio/webm', 'audio/mp4', 'audio/ogg'].find(t => MediaRecorder.isTypeSupported(t)) || '';
    mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(recTimerInterval);
      timerEl.style.display = 'none';
      micIcon.style.display = '';
      micStopIcon.style.display = 'none';

      const actualMime = mediaRecorder.mimeType || mimeType || 'audio/webm';
      const blob = new Blob(chunks, { type: actualMime });
      if (!blob.size) return;

      const inp = document.getElementById('chatInput');
      inp.value = '';
      inp.placeholder = '음성 변환 중...';
      try {
        const wavBase64 = await blobToWavBase64(blob);
        const res = await fetch(KANANA_BASE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'kanana-o',
            messages: [{
              role: 'user',
              content: [
                { type: 'input_audio', input_audio: { data: wavBase64, format: 'wav' } },
                { type: 'text', text: '음성인식 결과만 그대로 출력해줘.' }
              ]
            }],
            modalities: ['text']
          })
        });
        const data = await res.json();
        const text = (data.choices?.[0]?.message?.content || '').trim();
        inp.placeholder = '메시지를 입력하세요...';
        if (text) {
          inp.value = text;
          sendChat();
        }
      } catch(e) {
        inp.placeholder = '음성 인식 실패. 직접 입력해주세요.';
        console.error('STT error:', e);
      }
    };

    mediaRecorder.start();
    micIcon.style.display = 'none';
    micStopIcon.style.display = '';

    let secs = 0;
    timerEl.textContent = '0s';
    timerEl.style.display = '';
    recTimerInterval = setInterval(() => {
      secs++;
      timerEl.textContent = `${secs}s`;
    }, 1000);

  }).catch(() => alert('마이크 권한이 필요해요.'));
}
